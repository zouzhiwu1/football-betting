<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}足球博彩平台{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; margin: 0; padding: 24px; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 1.5rem; margin: 0 0 24px 0; color: #1a1a1a; text-align: center; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #444; font-weight: 500; }
    input[type="text"], input[type="tel"], input[type="email"], input[type="password"], select { width: 100%; padding: 12px 14px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    input:focus, select:focus { outline: none; border-color: #2563eb; }
    select { cursor: pointer; appearance: auto; }
    button.primary { width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
    button.primary:hover { background: #1d4ed8; }
    button.primary:disabled { background: #94a3b8; cursor: not-allowed; }
    button.secondary { width: 100%; padding: 10px; background: #e2e8f0; color: #475569; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }
    button.secondary:hover { background: #cbd5e1; }
    .msg { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 14px; }
    .msg.success { background: #dcfce7; color: #166534; }
    .msg.error { background: #fee2e2; color: #991b1b; }
    .link-row { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
    .link-row a { color: #2563eb; text-decoration: none; }
    .link-row a:hover { text-decoration: underline; }
    .hint { font-size: 12px; color: #64748b; margin-top: -8px; margin-bottom: 12px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block extra_js %}{% endblock %}
</body>
</html>
