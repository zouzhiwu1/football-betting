{% extends "base.html" %}
{% block title %}登录 - 足球博彩平台{% endblock %}
{% block content %}
  <h1>登录</h1>
  <form id="login-form">
    <label for="phone">手机号</label>
    <input type="tel" id="phone" name="phone" placeholder="请输入 11 位手机号" minlength="11" maxlength="11" pattern="[0-9]{11}" title="请输入11位数字手机号" required>
    <label for="password">密码</label>
    <input type="password" id="password" name="password" placeholder="请输入密码" required>
    <button type="submit" class="primary" id="btn-submit">登录</button>
  </form>
  <div id="msg" class="msg" style="display:none;"></div>
  <p class="link-row">还没有账号？<a href="/register">去注册</a></p>
{% endblock %}
{% block extra_js %}
<script>
(function() {
  var form = document.getElementById('login-form');
  var btn = document.getElementById('btn-submit');
  var msgEl = document.getElementById('msg');
  function showMsg(text, isError) {
    msgEl.textContent = text;
    msgEl.className = 'msg ' + (isError ? 'error' : 'success');
    msgEl.style.display = 'block';
  }
  form.onsubmit = function(e) {
    e.preventDefault();
    var phone = document.getElementById('phone').value.trim();
    var password = document.getElementById('password').value;
    if (!/^\d{11}$/.test(phone)) { showMsg('请输入 11 位有效手机号', true); return; }
    if (!password) { showMsg('请输入密码', true); return; }
    btn.disabled = true;
    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: phone, password: password })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          if (data.token) localStorage.setItem('token', data.token);
          if (data.user) localStorage.setItem('username', data.user.username || data.user.phone);
          window.location.href = '/home';
        } else {
          showMsg(data.message || '登录失败', true);
          btn.disabled = false;
        }
      })
      .catch(function() {
        showMsg('网络错误，请重试', true);
        btn.disabled = false;
      });
  };
})();
</script>
{% endblock %}
